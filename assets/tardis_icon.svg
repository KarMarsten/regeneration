<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160">
  <!-- TARDIS Icon for Regeneration App — square 160×160 canvas -->

  <!-- Background fill -->
  <rect width="160" height="160" fill="#001a33"/>

  <!-- Outer glow circle -->
  <circle cx="80" cy="80" r="76" fill="#002244"/>

  <!-- Group: TARDIS centered, scaled to fit with padding -->
  <!-- Original TARDIS was 120w × 150h; fits in ~100w × 125h box centred at 80,82 -->
  <g transform="translate(30, 17) scale(0.833)">

    <!-- Lantern base -->
    <rect x="46" y="4" width="28" height="14" rx="4" fill="#003b6f"/>
    <!-- Lantern globe -->
    <ellipse cx="60" cy="8" rx="10" ry="6" fill="#e8f4ff" opacity="0.9"/>
    <ellipse cx="60" cy="8" rx="6" ry="3.5" fill="white" opacity="0.7"/>

    <!-- Main body -->
    <rect x="8" y="16" width="104" height="126" rx="5" fill="#003b6f"/>

    <!-- Police Box sign -->
    <rect x="8" y="16" width="104" height="18" fill="#004d99"/>
    <text x="60" y="28.5" font-family="Arial" font-weight="bold" font-size="8"
          fill="white" text-anchor="middle" letter-spacing="2">POLICE  BOX</text>

    <!-- Panel dividers -->
    <line x1="60" y1="34" x2="60" y2="142" stroke="#002855" stroke-width="2.5"/>
    <line x1="8" y1="85" x2="112" y2="85" stroke="#002855" stroke-width="1.5"/>

    <!-- Top windows - left panel -->
    <rect x="14" y="38" width="20" height="26" rx="2" fill="#c8dff0" opacity="0.85"/>
    <line x1="24" y1="38" x2="24" y2="64" stroke="#002855" stroke-width="1"/>
    <line x1="14" y1="51" x2="34" y2="51" stroke="#002855" stroke-width="1"/>

    <rect x="38" y="38" width="18" height="26" rx="2" fill="#c8dff0" opacity="0.85"/>
    <line x1="47" y1="38" x2="47" y2="64" stroke="#002855" stroke-width="1"/>
    <line x1="38" y1="51" x2="56" y2="51" stroke="#002855" stroke-width="1"/>

    <!-- Top windows - right panel -->
    <rect x="64" y="38" width="18" height="26" rx="2" fill="#c8dff0" opacity="0.85"/>
    <line x1="73" y1="38" x2="73" y2="64" stroke="#002855" stroke-width="1"/>
    <line x1="64" y1="51" x2="82" y2="51" stroke="#002855" stroke-width="1"/>

    <rect x="86" y="38" width="20" height="26" rx="2" fill="#c8dff0" opacity="0.85"/>
    <line x1="96" y1="38" x2="96" y2="64" stroke="#002855" stroke-width="1"/>
    <line x1="86" y1="51" x2="106" y2="51" stroke="#002855" stroke-width="1"/>

    <!-- Lower decorative frames -->
    <rect x="13" y="89" width="44" height="46" rx="3" fill="none" stroke="#002855" stroke-width="2"/>
    <rect x="63" y="89" width="44" height="46" rx="3" fill="none" stroke="#002855" stroke-width="2"/>

    <!-- Door handles -->
    <circle cx="54" cy="114" r="3.5" fill="#c8d8e8"/>
    <circle cx="66" cy="114" r="3.5" fill="#c8d8e8"/>

  </g>
</svg>
