<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- TARDIS Icon — 120×120 square, TARDIS fills the frame -->

  <!-- Background -->
  <rect width="120" height="120" fill="#001a33"/>

  <!-- Lantern base (top, centred) -->
  <rect x="46" y="2" width="28" height="10" rx="3" fill="#003b6f"/>
  <!-- Lantern globe -->
  <ellipse cx="60" cy="5" rx="9" ry="5" fill="#e8f4ff" opacity="0.9"/>
  <ellipse cx="60" cy="5" rx="5" ry="3" fill="white" opacity="0.7"/>

  <!-- Main body — fills almost the whole canvas -->
  <rect x="4" y="12" width="112" height="106" rx="5" fill="#003b6f"/>

  <!-- Police Box sign -->
  <rect x="4" y="12" width="112" height="16" fill="#004d99"/>
  <text x="60" y="23" font-family="Arial" font-weight="bold" font-size="8"
        fill="white" text-anchor="middle" letter-spacing="2">POLICE  BOX</text>

  <!-- Panel dividers -->
  <line x1="60" y1="28" x2="60" y2="118" stroke="#002855" stroke-width="2.5"/>
  <line x1="4"  y1="72" x2="116" y2="72" stroke="#002855" stroke-width="1.5"/>

  <!-- Top windows — left panel -->
  <rect x="10" y="32" width="22" height="28" rx="2" fill="#c8dff0" opacity="0.85"/>
  <line x1="21" y1="32" x2="21" y2="60" stroke="#002855" stroke-width="1"/>
  <line x1="10" y1="46" x2="32" y2="46" stroke="#002855" stroke-width="1"/>

  <rect x="36" y="32" width="20" height="28" rx="2" fill="#c8dff0" opacity="0.85"/>
  <line x1="46" y1="32" x2="46" y2="60" stroke="#002855" stroke-width="1"/>
  <line x1="36" y1="46" x2="56" y2="46" stroke="#002855" stroke-width="1"/>

  <!-- Top windows — right panel -->
  <rect x="64" y="32" width="20" height="28" rx="2" fill="#c8dff0" opacity="0.85"/>
  <line x1="74" y1="32" x2="74" y2="60" stroke="#002855" stroke-width="1"/>
  <line x1="64" y1="46" x2="84" y2="46" stroke="#002855" stroke-width="1"/>

  <rect x="88" y="32" width="22" height="28" rx="2" fill="#c8dff0" opacity="0.85"/>
  <line x1="99" y1="32" x2="99" y2="60" stroke="#002855" stroke-width="1"/>
  <line x1="88" y1="46" x2="110" y2="46" stroke="#002855" stroke-width="1"/>

  <!-- Lower decorative frames -->
  <rect x="9"  y="76" width="47" height="38" rx="3" fill="none" stroke="#002855" stroke-width="2"/>
  <rect x="64" y="76" width="47" height="38" rx="3" fill="none" stroke="#002855" stroke-width="2"/>

  <!-- Door handles -->
  <circle cx="53"  cy="97" r="3.5" fill="#c8d8e8"/>
  <circle cx="67" cy="97" r="3.5" fill="#c8d8e8"/>
</svg>
